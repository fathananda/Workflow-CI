name: CI - MLflow Training Pipeline
# Fathi Ananda Mas'ud | fathiananda00@gmail.com

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Manual trigger

jobs:
  train:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MLProject

    steps:
      # ── 1. Checkout Repository ────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Set Up Python ──────────────────────────────────────────────────────
      - name: Set Up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      # ── 3. Install Dependencies ───────────────────────────────────────────────
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn==1.5.2 mlflow==2.19.0 pandas==2.2.3 \
                      numpy==1.26.4 matplotlib==3.9.2 seaborn==0.13.2

      # ── 4. Verify Dataset ─────────────────────────────────────────────────────
      - name: Verify Dataset
        run: |
          echo "Dataset files:"
          ls -lh iris_preprocessing.csv || echo "Dataset not found, generating..."
          python -c "
          import pandas as pd
          from sklearn.datasets import load_iris
          from sklearn.preprocessing import StandardScaler
          iris = load_iris(as_frame=True)
          df = iris.frame
          df.columns = ['sepal_length','sepal_width','petal_length','petal_width','target']
          scaler = StandardScaler()
          feats = ['sepal_length','sepal_width','petal_length','petal_width']
          df[feats] = scaler.fit_transform(df[feats])
          df.to_csv('iris_preprocessing.csv', index=False)
          print(f'Dataset ready: {df.shape}')
          "

      # ── 5. Run MLflow Training ─────────────────────────────────────────────────
      - name: Run MLflow Training
        run: |
          mlflow run . \
            --env-manager=local \
            -P n_estimators=100 \
            -P max_depth=5 \
            -P min_samples_split=2

      # ── 6. List MLflow Artifacts ───────────────────────────────────────────────
      - name: List MLflow Artifacts
        run: |
          echo "MLflow runs:"
          ls -lah mlruns/ || echo "No mlruns found"

      # ── 7. Upload Artifacts to GitHub ─────────────────────────────────────────
      - name: Upload MLflow Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts-${{ github.run_number }}
          path: MLProject/mlruns/
          retention-days: 30

      # ── 8. Build Docker Image (Advanced) ──────────────────────────────────────
      - name: Build Docker Image
        if: github.ref == 'refs/heads/main'
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          pip install mlflow==2.19.0
          # Login ke Docker Hub
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

          # Dapatkan Run ID terbaru
          RUN_ID=$(ls mlruns/0/ | grep -v "meta.yaml" | tail -1)
          echo "Run ID: $RUN_ID"

          # Build Docker image menggunakan mlflow build-docker
          mlflow models build-docker \
            --model-uri "mlruns/0/$RUN_ID/artifacts/model" \
            --name "$DOCKER_USERNAME/iris-classifier-fathi"

          # Push ke Docker Hub
          docker push "$DOCKER_USERNAME/iris-classifier-fathi:latest"

          # Simpan link ke file
          echo "https://hub.docker.com/r/$DOCKER_USERNAME/iris-classifier-fathi" > docker_image_link.txt
          cat docker_image_link.txt

      - name: Upload Docker Info
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: docker-info
          path: MLProject/docker_image_link.txt
