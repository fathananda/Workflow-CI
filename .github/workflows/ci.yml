name: CI - MLflow Training Pipeline
# Fathi Ananda Mas'ud | fathiananda00@gmail.com

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MLProject

    steps:
      # ── 1. Checkout Repository ────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Set Up Python ──────────────────────────────────────────────────────
      - name: Set Up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      # ── 3. Install Dependencies ───────────────────────────────────────────────
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn==1.5.2 mlflow==2.19.0 pandas==2.2.3 \
                      numpy==1.26.4 matplotlib==3.9.2 seaborn==0.13.2

      # ── 4. Verify Dataset ─────────────────────────────────────────────────────
      - name: Verify Dataset
        run: |
          python -c "
          import os, pandas as pd
          from sklearn.datasets import load_iris
          from sklearn.preprocessing import StandardScaler
          if not os.path.exists('iris_preprocessing.csv'):
              iris = load_iris(as_frame=True)
              df = iris.frame
              df.columns = ['sepal_length','sepal_width','petal_length','petal_width','target']
              from sklearn.preprocessing import StandardScaler
              scaler = StandardScaler()
              feats = ['sepal_length','sepal_width','petal_length','petal_width']
              df[feats] = scaler.fit_transform(df[feats])
              df.to_csv('iris_preprocessing.csv', index=False)
              print(f'Dataset generated: {df.shape}')
          else:
              df = pd.read_csv('iris_preprocessing.csv')
              print(f'Dataset loaded: {df.shape}')
          "

      # ── 5. Run MLflow Training ─────────────────────────────────────────────────
      - name: Run MLflow Training
        run: |
          mlflow run . \
            --env-manager=local \
            -P n_estimators=100 \
            -P max_depth=5 \
            -P min_samples_split=2

      # ── 6. List MLflow Artifacts ───────────────────────────────────────────────
      - name: List MLflow Artifacts
        run: |
          echo "MLflow runs:"
          find mlruns/ -type f | head -30 || echo "No mlruns found"

      # ── 7. Upload Artifacts to GitHub ─────────────────────────────────────────
      - name: Upload MLflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts-${{ github.run_number }}
          path: MLProject/mlruns/
          retention-days: 30
